<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 04 - PW1_SMD</title>
</head>
<!--  Crie um formulário HTML que possua um único 
campo do tipo combobox (HTML Select) 
obrigatório e implemente uma função JavaScript 
que verifique se este único campo do tipo 
combobox obrigatório está selecionando algo 
válido (onde algo válido é algum opção que não 
é a primeira) -->
<body>
    <form>
        <label for="combobox">Selecione o melhor elemento de AOP:</label>
        <br>
        <select name="combobox" id="combobox" required>
            <option value="">Selecione uma opção... </option>
            <option value="Energia">Energia</option>
            <option value="Medo">Medo</option>
            <option value="Conhecimento">Conhecimento</option>
            <option value="Morte">Morte</option>
            <option value="Sangue">Sangue</option>
        </select>
        <button type="submit" onclick="verificaCampo()">Enviar</button>
    </form>
    <script type="text/javascript">
        function verificaCampo() {
            var combobox = document.getElementById("combobox");

            if (combobox.value == "") {
                alert("Selecione um elemento!")
            } else {
                alert("Selecionado com sucesso!")
            }
        }

    </script>
</body>

</html>
