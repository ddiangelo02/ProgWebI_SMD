<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 02 - PW1_SMD</title>
</head>
<!-- Crie um formulário HTML que possua um único 
campo do tipo texto obrigatório e implemente 
uma função JavaScript que verifique se este 
único campo do tipo texto obrigatório está 
preenchido com algo válido, além de possuir no 
mínimo 1 caractere e no máximo 10 caracteres -->
<body>
    <form>
        <label for="campoTexto">Texto:</label>
        <input type="text" id="campoTexto" name="campoTexto" required />
        <button type="submit" onclick="verificaCampo()">Enviar</button>
    </form>
    <script type="text/javascript">
        function verificaCampo() {
            var campoTexto = document.getElementById("campoTexto");
            var qtdCaracteres = campoTexto.value.length;

            if (campoTexto.value != "") {
                if (qtdCaracteres >= 1 && qtdCaracteres <= 10) {
                    alert("Preenchido com sucesso!");
                } else {
                    alert("Preenchimento inválido!");
                }
            } else {
                alert("Preencha o campo de texto.");
            }
        }

    </script>
</body>

</html>
