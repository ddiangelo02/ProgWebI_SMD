<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 03 - PW1_SMD</title>
</head>
<!-- Crie um formulário HTML que possua um 
único campo do tipo texto obrigatório e 
implemente uma função JavaScript que 
verifique se este único campo do tipo texto 
obrigatório está preenchido com um número 
inteiro positivo válido -->
<body>
    <form>
        <label for="campoTexto">Digite um número:</label>
        <input type="text" id="campoTexto" name="campoTexto" required />
        <button type="submit" onclick="verificaCampo()">Enviar</button>
    </form>
    <script type="text/javascript">
        function verificaCampo() {
            var campoTexto = document.getElementById("campoTexto");
            var numInt = parseInt(campoTexto.value);
            if (isNaN(numInt)) {
                alert("Insira um número.");
            } else {
                if (numInt >=0) {
                    alert("Preenchido com sucesso!");
                } else {
                    alert ("O número preenchido é inválido.");
                }
            }
        }

    </script>
</body>

</html>
