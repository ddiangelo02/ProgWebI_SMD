<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 01 - PW1_SMD</title>
</head>
<!-- Crie um formulário HTML que possua um 
único campo do tipo texto obrigatório e 
implemente uma função JavaScript que 
verifique se este único campo do tipo texto 
obrigatório está preenchido com algo -->
<body>
    <form onsubmit="verificaCampo()">
        <label for="campoTexto">Texto:</label>
        <input type="text" id="campoTexto" name="campoTexto" required/>
        <button type="submit">Enviar</button>
    </form>
    <script type="text/javascript">
        function verificaCampo() {
            var campoTexto = document.getElementById("campoTexto");
            if (campoTexto.value != "") {
                alert("Você preencheu o texto!");
            } else {
                alert("Preencha o campo de texto.");
            }
        }

    </script>
</body>

</html>
