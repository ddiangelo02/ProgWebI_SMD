<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 05 - PW1_SMD</title>

<!--  Crie um formulário HTML que possua um 
único campo do tipo checkbox e implemente 
uma função JavaScript que verifique se este 
único campo do tipo checkbox está 
selecionado -->
<body>
    <form>
        <input type="checkbox" name="termosUso" id="termosUso" value="SIM" required>
        <label for="termosUso">Concordo com os Termos de Uso e Privacidade do site.</label>
        <br>
        <button type="submit" onclick="verificaCampo()">Enviar</button>
    </form>
    <script type="text/javascript">
        function verificaCampo() {
            var termosUso = document.getElementById("termosUso");

            if (!termosUso.checked) {
                alert("Você deve aceitar os Termos de Uso para poder continuar!")
            } else {
                alert("Obrigado por aceitar os termos!")
            }
        }

    </script>
</body>

</html>
